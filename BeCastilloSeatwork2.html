<!DOCTYPE html>
<html>
<head>

  <meta name="author" content="Castillo, Sophia Violet C" />
  <meta name="revised" content="March 27, 2026" />

  <style>

    body { font-family: Arial, sans-serif; }
    .header, .footer {
      background: lightblue;
      padding: 10px;
    }
    .footer {
       opacity: 0.5;

       position: fixed; 
       bottom: 0; 
       width: 100%;
    }
    .sidebar {
      background: lightgreen;
      width: 150px;
      height: 200px;

      position: relative;
      top: 20px; 
      left: 20px;
    }
    .content {
      background: lightyellow;
      width: 300px;
      height: 200px;

      position: relative; 
      top: 66px; 
      left: 200px;

      z-index: 1; 
    }    
    .notice {
    top: 10px;
    left: 10px;
    position: absolute;
    background: orange;
    padding: 10px;
    z-index: 2;
    }

  </style>

</head>

<body>
  <div class="header">Header</div>
  <div class="sidebar">Sidebar</div>
  <div class="content">Main Content</div>
  <div class="notice">Notice</div>
  <div class="footer">Footer</div>
</body>
</html>
