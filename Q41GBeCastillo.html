<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="stylesheet.css">
    <title>Movie Rating</title>
    <link rel="icon" type="image/ico" href="images/movie.ico">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url("images/plaidBackground.jpg")
        }

        h2 {
            font-family: "pinlock";
            font-size: 40px;
        }

        .box {
            position: relative;
            width: 500px;
            margin: 20px;
            border: rgb(201, 201, 201) solid 1px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        label {
            font-family: "simple";
            text-decoration: solid;
            font-size: 20px;
            margin: 10px;
        }

        input {
            width: auto;
            margin: 5px;
            border: rgb(201, 201, 201) solid 1px;
            font-family: "simple";
            text-decoration: solid;
            padding: 8px;
            font-size: 20px;
            border-radius: 10px;
        }

        .stars {
            margin: 5px;
            gap: 4px;
        }

        .star {
            font-size: 28px;
            color: lightgray;
            cursor: pointer;
            transition: color 0.2s;
        }

        .star:hover, 
        .star.selected {
            color: rgb(255, 225, 53);
            }

        button.add {
            width: 200px;
            padding: 10px;
            background: rgb(151, 206, 238);
            font-family: "pie";
            justify-self: center;
            border-radius: 10px;
            font-size: 20px;
            transition: 0.1s;
        }

        button.add:active {
            transform: translateY(4px); /* moves the text when clicked (the bounce effect) */
        }

        button.add:hover, button.add:focus {
            font-size: 24px;
            padding: 14px /* increases font size when clicked (the bounce effect) */

        }
        
        li {
            font-family: "simple";
            text-decoration: solid;
            font-size: 18px;
            margin: 10px;
            border: rgb(201, 201, 201) solid 1px;
            padding: 8px;
            list-style: none;
            justify-self: center;
            width: 400px;
            text-align: center;
            border-radius: 10px;
        }

        option, select {
            font-family: "simple";
            text-decoration: solid;
            font-size: 20px;
        }

        a {
            font-family: "simple";
            text-decoration: solid;
            font-size: 40px;
            margin: 10px;
            color: rgb(255, 245, 190);
        }

        .delete {
            width: 60px;
            font-size: 15px;
            padding: 10px;
            background: rgb(151, 206, 238);
            font-family: "simple";
            text-align: center;
            align-items: center;
            border-radius: 10px;
            transition: 0.1s;

            margin: 10px;
        }
    </style>
</head>

<body>
    <a href="index.html">⊹</a>

    <div class="box">
    <h2>Add a Movie</h2>

    <label for="title">Title: </label>    
    <input type="text" id="title"> <br> <br>

    <label for="year">Year: </label>    
    <input type="number" id="year"> <br> <br>

    <label for="genre">Genre: </label>    
    <select id="genre"> 
        <option value="Action">Action</option>
        <option value="Adventure">Adventure</option>
        <option value="Animation">Animation</option>
        <option value="Comedy">Comedy</option>
        <option value="Documentary">Documentary</option>
        <option value="Drama">Drama</option>
        <option value="Fantasy">Fantasy</option>
        <option value="Musical">Musical</option>
        <option value="Horror">Horror</option>
        <option value="Sci-Fi">Sci-Fi</option>
        <option value="Supernatural">Supernatural</option>
        <option value="Thriller">Thriller</option>
    </select> <br> <br>

    <label>Rating: </label> <br>
    <div class="stars" id="rating"> 
        <span class="star" data-value="1">★</span>
        <span class="star" data-value="2">★</span>
        <span class="star" data-value="3">★</span>
        <span class="star" data-value="4">★</span>
        <span class="star" data-value="5">★</span>
    </div>

    <br>
    <button class="add" onclick="addMovie()" >Add Movie</button>

    <h2>Movie List</h2>
    <ul id="movieList">


    </ul>

    <script>
        let selectedRating = 0;

        // Handle star clicks
        document.querySelectorAll(".star").forEach(star => {
            star.addEventListener("click", function() {
                selectedRating = parseInt(this.getAttribute("data-value"));
                updateStars(selectedRating);
            });
        });

        function updateStars(rating) {
            document.querySelectorAll(".star").forEach(star => {
                const value = parseInt(star.getAttribute("data-value"));
                if (value <= rating) {
                    star.classList.add("selected");
                } else {
                    star.classList.remove("selected");
                }
            });
        }

        function displayMovies() {
            const movieList = JSON.parse(localStorage.getItem("movies")) || []; 
            const movieListElement = document.getElementById("movieList"); //gets movie list element
            movieListElement.innerHTML = ""; // Clear existing list to avoid duplicates

            movieList.forEach(movie => {
                let stars = "";
                const rating = parseInt(movie.rating); // Ensure rating is a number

                for (let i = 0; i < rating; i++) {
                    stars += '<span style="color: gold">★</span>';
                }
                for (let i = rating; i < 5; i++) {
                    stars += '<span style="color: lightgray">★</span>';
                }

                const listItem = document.createElement("li");
                listItem.innerHTML = `${movie.title} (${movie.year}) - ${movie.genre}, Rating: ${stars}`+ '<button onclick="deleteMovie(\'' + movie.title + '\')" class=delete>Delete</button>'; 
                movieListElement.appendChild(listItem); // Add the new list item to the movie list element
            });
        }

        function deleteMovie() {
            if (!confirm("Are you sure you want to delete this movie?")) {
                return; // Exit if the user cancels the deletion
            }
            else {
            const title = event.target.parentElement.textContent.split(" (")[0]; // Get the movie title from the list item
            let movieList = JSON.parse(localStorage.getItem("movies")) || []; // Get the current movie list from localStorage

            // Filter out the movie to be deleted
            movieList = movieList.filter(movie => movie.title !== title);

            // Update localStorage with the new movie list
            localStorage.setItem("movies", JSON.stringify(movieList));

            // Refresh the displayed movie list
            displayMovies();
            }
        }

        function addMovie() {
            const title = document.getElementById("title").value;
            const year = document.getElementById("year").value;
            const genre = document.getElementById("genre").value;

            if (!title || !year || !genre || selectedRating === 0) {
                alert("Please fill out all fields and select a rating.");
                return;
            }

            let movieList = JSON.parse(localStorage.getItem("movies")) || [];

            // Check if a movie with the same title already exists
            let existingMovie = movieList.find(movie => movie.title === title);

            if (existingMovie) {
                // Update the existing movie's rating by averaging with the new rating
                let aveRating = (parseInt(existingMovie.rating) + selectedRating) / 2;
                aveRating = Math.round(aveRating);
                existingMovie.rating = aveRating;
            
            } else {
            // Add a new movie if it doesn't exist
                const newMovie = {
                    title,
                    year,
                    genre,
                    rating: selectedRating
                };
                    movieList.push(newMovie);
            }

            // Save the updated list back to localStorage
            localStorage.setItem("movies", JSON.stringify(movieList));

            displayMovies();

            // Clear the form
            document.getElementById("title").value = "";
            document.getElementById("year").value = "";
            document.getElementById("genre").value = "";
            selectedRating = 0;
            updateStars(selectedRating);

            alert("Movie added/updated successfully!");
}


        // Display movies on page load
        displayMovies();
    </script>
</body>
</html>
    

</body>
